services:
  employee-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: employee-service
    ports:
      - "8001:8000"
    env_file:
      - .env
    depends_on:
      employee-db:
        condition: service_healthy
    networks:
      - payroll-network

  employee-db:
    image: mysql:8.4
    container_name: employee-db
    environment:
      MYSQL_DATABASE: employee_service
      MYSQL_USER: employee_user
      MYSQL_PASSWORD: employee_password
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "33061:3306"
    volumes:
      - employee-db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot_password"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - payroll-network

networks:
  payroll-network:
    name: payroll-network

volumes:
  employee-db-data:
